<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ground Break</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins', sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url('holiday.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;

    overflow-x:hidden;

    min-height:100vh;
}

/* ================= NAVBAR ================= */

nav{
    width:100%;

    background:rgba(30,30,30,0.92);

    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:15px 6%;

    position:sticky;
    top:0;

    z-index:1000;

    gap:15px;
}

.logo{
    width:170px;

    max-width:100%;

    height:auto;

    transition:0.3s;
}

.logo:hover{
    transform:scale(1.05);

    filter:drop-shadow(0px 6px 15px rgba(255,215,0,0.5));
}

.nav-links{
    display:flex;

    align-items:center;
    justify-content:center;

    flex-wrap:wrap;

    gap:12px;
}

.nav-links a{
    text-decoration:none;

    color:white;

    font-size:16px;
    font-weight:700;

    padding:10px 16px;

    border-radius:30px;

    transition:0.3s ease;
}

.nav-links a:hover{
    background:gold;

    color:black;

    transform:translateY(-2px);
}

/* ================= HERO SECTION ================= */

.banner{
    width:100%;

    max-width:1100px;

    margin:auto;

    min-height:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:45px 5% 25px;
}

.banner-content{
    width:100%;
}

.banner-logo{
    width:clamp(160px, 32vw, 320px);

    max-width:100%;

    margin-bottom:25px;

    filter:drop-shadow(0px 12px 30px rgba(0,0,0,0.8));

    transition:0.3s;
}

.banner-logo:hover{
    transform:scale(1.03);
}

.banner-content p{
    font-size:clamp(15px, 2.3vw, 20px);

    font-weight:600;

    line-height:1.9;

    margin-bottom:25px;

    text-shadow:0px 5px 15px rgba(0,0,0,0.8);
}

/* ================= BUTTON ================= */

.start-btn{
    display:inline-block;

    padding:14px 32px;

    background:gold;
    color:black;

    text-decoration:none;

    font-size:clamp(14px, 2vw, 18px);

    font-weight:800;

    border-radius:50px;

    transition:0.3s;
}

.start-btn:hover{
    background:white;

    transform:scale(1.05);
}

/* ================= WELCOME SECTION ================= */

.container{
    width:100%;

    max-width:1100px;

    margin:auto;

    padding:0 5% 60px;
}

.text-box{
    background:rgba(255,255,255,0.96);

    color:#222;

    padding:clamp(20px, 4vw, 50px);

    border-radius:25px;

    box-shadow:0px 12px 35px rgba(0,0,0,0.3);

    transition:0.3s;
}

.text-box:hover{
    transform:translateY(-4px);
}

.text-box p{
    font-size:clamp(15px, 2.3vw, 20px);

    line-height:1.9;

    font-weight:600;

    text-align:center;

    word-wrap:break-word;
}

/* ================= TABLETS ================= */

@media (max-width:768px){

    nav{
        flex-direction:column;

        text-align:center;

        padding:15px;
    }

    .logo{
        width:140px;
    }

    .nav-links{
        width:100%;

        gap:10px;
    }

    .nav-links a{
        font-size:15px;

        padding:8px 14px;
    }

    .banner{
        padding:45px 20px 25px;
    }

    .container{
        padding:0 20px 50px;
    }

    .text-box{
        border-radius:20px;
    }
}

/* ================= MOBILE ================= */

@media (max-width:480px){

    body{
        background-attachment:scroll;
    }

    .logo{
        width:120px;
    }

    .nav-links{
        gap:8px;
    }

    .nav-links a{
        font-size:13px;

        padding:7px 10px;
    }

    .banner{
        padding:35px 15px 25px;
    }

    .banner-logo{
        width:200px;
    }

    .container{
        padding:0 15px 40px;
    }

    .text-box{
        padding:20px;

        border-radius:18px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav>

    <img src="GroundBreak.png"
         class="logo"
         alt="Ground Break Logo">

    <div class="nav-links">

        <a href="index.html">Home</a>

        <a href="About.html">About</a>

        <a href="Services.html">Services</a>

        <a href="Contact.html">Contact</a>

    </div>

</nav>

<!-- HERO SECTION -->

<section class="banner">

    <div class="banner-content">

        <img src="GroundBreak.png"
             class="banner-logo"
             alt="Ground Break Logo">

        <p>
            Food • Fun • Relaxation
        </p>

        <a href="Services.html"
           class="start-btn">

           Get Started

        </a>

    </div>

</section>

<!-- WELCOME SECTION -->

<div class="container">

    <div class="text-box">

        <p>
            Welcome to Ground Break — where good food,
            exciting games, and unforgettable moments
            come together.
        </p>

    </div>

</div>

</body>
</html>
