<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ground Break</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins', sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url('holiday.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;
    overflow-x:hidden;
    min-height:100vh;
}

/* ================= NAVBAR (FIXED) ================= */

nav{
    width:100%;
    background:rgba(30,30,30,0.92);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:15px 6%;

    position:sticky;
    top:0;
    z-index:1000;

    gap:15px;
}

.logo{
    width:170px;
    max-width:100%;
    height:auto;
    transition:0.3s;
}

.logo:hover{
    transform:scale(1.05);
    filter:drop-shadow(0px 6px 15px rgba(255,215,0,0.5));
}

.nav-links{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:12px;
}

.nav-links a{
    text-decoration:none;
    color:white;

    font-size:16px;
    font-weight:700;

    padding:10px 16px;
    border-radius:30px;

    transition:0.3s ease;
}

.nav-links a:hover{
    background:gold;
    color:black;
    transform:translateY(-2px);
}

/* ================= HERO ================= */

.banner{
    width:100%;
    min-height:80vh;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:40px 5%;
}

.banner-content{
    width:100%;
    max-width:900px;
}

.banner-logo{
    width:clamp(160px, 45vw, 380px);
    height:auto;
    margin-bottom:20px;
}

.banner-content p{
    font-size:clamp(14px, 3.5vw, 22px);
    font-weight:600;
    margin-bottom:20px;
}

/* BUTTON */

.start-btn{
    display:inline-block;

    padding:12px 26px;
    background:gold;
    color:black;

    font-size:clamp(14px, 3vw, 18px);
    font-weight:800;

    border-radius:50px;
    text-decoration:none;

    transition:0.3s;
}

.start-btn:hover{
    background:white;
    transform:scale(1.05);
}

/* ================= TEXT BOX ================= */

.container{
    width:100%;
    display:flex;
    justify-content:center;

    padding:40px 5% 60px;
}

.text-box{
    width:100%;
    max-width:900px;

    background:rgba(255,255,255,0.95);

    padding:clamp(18px, 4vw, 35px);

    border-radius:20px;

    color:#222;

    text-align:center;
}

.text-box p{
    font-size:clamp(14px, 3.5vw, 20px);
    font-weight:600;
    line-height:1.7;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    nav{
        flex-direction:column;
        text-align:center;
    }

    .banner{
        min-height:70vh;
    }
}

@media(max-width:480px){

    body{
        background-attachment:scroll;
    }

    .logo{
        width:120px;
    }

    .nav-links a{
        font-size:13px;
        padding:7px 10px;
    }

    .banner{
        padding:30px 5%;
    }
}

</style>
</head>

<body>

<nav>

    <img src="GroundBreak.png" class="logo" alt="Ground Break Logo">

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="About.html">About</a>
        <a href="Services.html">Services</a>
        <a href="Contact.html">Contact</a>
    </div>

</nav>

<section class="banner">

    <div class="banner-content">

        <img src="GroundBreak.png" class="banner-logo" alt="Ground Break">

        <p>Food • Fun • Relaxation</p>

        <a href="Services.html" class="start-btn">Get Started</a>

    </div>

</section>

<div class="container">
    <div class="text-box">
        <p>
            Welcome to Ground Break — where good food,
            exciting games, and unforgettable moments come together.
        </p>
    </div>
</div>

</body>
</html>
