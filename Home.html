<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ground Break</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins', sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url('holiday.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
    overflow-x:hidden;
}

nav{
    width:100%;
    background:rgba(20,20,20,0.85);
    backdrop-filter:blur(12px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 6%;
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0px 5px 25px rgba(0,0,0,0.6);
}

.logo{
    width:170px;
    transition:0.35s;
}

.logo:hover{
    transform:scale(1.08);
    filter:drop-shadow(0px 8px 20px rgba(255,215,0,0.6));
}

.nav-links{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:17px;
    font-weight:700;
    padding:10px 18px;
    border-radius:40px;
    transition:0.35s;
}

.nav-links a:hover{
    background:gold;
    color:black;
    transform:translateY(-3px);
}

.banner{
    width:100%;
    min-height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.banner-content{
    max-width:850px;
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

.banner-logo{
    width:450px;
    max-width:90%;
    margin-bottom:25px;
    filter:drop-shadow(0px 10px 25px rgba(0,0,0,0.8));
}

.banner-content p{
    font-size:26px;
    font-weight:600;
    margin-bottom:35px;
    text-shadow:0px 5px 15px rgba(0,0,0,0.8);
}

.start-btn{
    display:inline-block;
    padding:18px 45px;
    background:gold;
    color:black;
    text-decoration:none;
    font-size:22px;
    font-weight:800;
    border-radius:60px;
    transition:0.35s;
    box-shadow:0px 10px 25px rgba(0,0,0,0.5);
}

.start-btn:hover{
    background:white;
    transform:translateY(-5px) scale(1.07);
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 5%;
}

.text-box{
    max-width:900px;
    background:rgba(255,255,255,0.95);
    padding:55px;
    border-radius:30px;
    box-shadow:0px 15px 40px rgba(0,0,0,0.4);
    color:#222;
    transition:0.35s;
}

.text-box:hover{
    transform:translateY(-8px);
}

.text-box p{
    font-size:24px;
    font-weight:600;
    line-height:2;
    text-align:center;
}

@media(max-width:768px){

    .banner-logo{
        width:320px;
    }

    .banner-content p{
        font-size:20px;
    }

    .start-btn{
        font-size:18px;
        padding:14px 30px;
    }

    .text-box{
        padding:30px;
    }

    .text-box p{
        font-size:18px;
    }
}

@media(max-width:480px){

    .banner-logo{
        width:240px;
    }

    .banner-content p{
        font-size:16px;
    }

    .start-btn{
        font-size:16px;
        padding:12px 24px;
    }

    .text-box p{
        font-size:15px;
    }
}

</style>
</head>

<body>

<nav>

    <img src="GroundBreak.png" class="logo" alt="logo">

    <div class="nav-links">
        <a href="Home.html">Home</a>
        <a href="About.html">About</a>
        <a href="Services.html">Services</a>
        <a href="Contact.html">Contact</a>
    </div>

</nav>

<section class="banner">

    <div class="banner-content">

        <img src="GroundBreak.png" class="banner-logo">

        <p>Food • Fun • Relaxation</p>

        <a href="Services.html" class="start-btn">Get Started</a>

    </div>

</section>

<div class="container">
    <div class="text-box">
        <p>
            Welcome to Ground Break — where good food,
            exciting games, and unforgettable moments come together.
        </p>
    </div>
</div>

</body>
</html>
