<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ground Break - Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url('holiday.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
    min-height:100vh;
}

/* NAVBAR */
nav{
    width:100%;
    background:rgba(30,30,30,0.92);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 6%;
    position:sticky;
    top:0;
    z-index:1000;
    flex-wrap:wrap;
}

.logo{
    width:160px;
    transition:0.3s;
}

.logo:hover{
    transform:scale(1.08);
}

/* LINKS */
.nav-links{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:700;
    padding:10px 14px;
    border-radius:30px;
    transition:0.3s;
}

.nav-links a:hover{
    background:gold;
    color:black;
    transform:translateY(-3px);
}

/* TITLE */
h1{
    text-align:center;
    font-size:clamp(28px,5vw,55px);
    margin:40px 0 20px;
    font-weight:800;
}

/* CONTAINER */
.container{
    width:100%;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:20px;
    padding:20px 5% 60px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.95);
    color:#222;
    padding:22px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 18px 45px rgba(0,0,0,0.4);
}

.card h2{
    text-align:center;
    margin-bottom:15px;
    font-size:22px;
    font-weight:800;
}

/* TEXT */
.card p{
    font-size:15px;
    margin:8px 0;
    line-height:1.6;
}

/* FORM */
input, textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    font-size:14px;
    outline:none;
    transition:0.3s;
}

input:focus, textarea:focus{
    box-shadow:0 0 0 2px gold;
}

textarea{
    height:110px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:gold;
    color:black;
    transform:scale(1.03);
}

/* FACEBOOK BUTTON */
.fb-link{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:12px;
    padding:10px 14px;
    background:#1877f2;
    color:white;
    font-weight:800;
    border-radius:10px;
    text-decoration:none;
    transition:0.3s;
    width:fit-content;
}

.fb-link:hover{
    background:black;
    color:gold;
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.fb-icon{
    width:20px;
    height:20px;
    filter:invert(1);
}

/* FEEDBACK */
.feedback-item{
    background:#f5f5f5;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:13px;
}

/* LOCATION BUTTON */
.location-link{
    display:inline-block;
    margin-top:10px;
    padding:10px 14px;
    background:gold;
    color:black;
    font-weight:800;
    border-radius:10px;
    text-decoration:none;
    transition:0.3s;
}

.location-link:hover{
    background:black;
    color:white;
    transform:translateY(-3px);
}

/* MOBILE */
@media(max-width:480px){
    .logo{
        width:120px;
    }

    .nav-links a{
        font-size:13px;
        padding:8px 10px;
    }

    .card{
        padding:18px;
    }
}

</style>
</head>

<body>

<nav>
    <img src="GroundBreak.png" class="logo">

    <div class="nav-links">
        <a href="Home.html">Home</a>
        <a href="About.html">About</a>
        <a href="Services.html">Services</a>
        <a href="Contact.html">Contact</a>
    </div>
</nav>

<h1>Contact Us</h1>

<div class="container">

    <div class="card">
        <h2>Contact Info</h2>

        <p>📞 +09 282 567 994</p>
        <p>📧 groundbreak@email.com</p>

        <p>📍 Location:</p>

        <a class="location-link"
           href="https://www.google.com/maps?q=7+M.+Santos+Street,+San+Jose,+Antipolo,+Rizal+1870"
           target="_blank">
            Open in Google Maps
        </a>

        <p style="margin-top:10px;font-size:12px;color:#666;">
            If offline, manually search the address in Maps later.
        </p>

        <a class="fb-link"
           href="https://www.facebook.com/GroundBreakBilliardCafe"
           target="_blank">

            <img class="fb-icon"
                 src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"
                 alt="Facebook">

            Ground Break Facebook Page
        </a>
    </div>

    <div class="card">
        <h2>Send Feedback</h2>

        <form id="feedbackForm">
            <input id="name" placeholder="Name" required>
            <input id="email" placeholder="Email" required>
            <input id="phone" placeholder="Contact Number" required>
            <textarea id="message" placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>

    <div class="card">
        <h2>Customer Feedback</h2>
        <div id="customerFeedback"></div>
    </div>

</div>

<script>

document.getElementById("feedbackForm").addEventListener("submit", function(e){
    e.preventDefault();

    let data = JSON.parse(localStorage.getItem("feedbacks")) || [];

    data.push({
        name:name.value,
        email:email.value,
        phone:phone.value,
        message:message.value,
        time:new Date().toLocaleString()
    });

    localStorage.setItem("feedbacks", JSON.stringify(data));

    this.reset();
    loadFeedback();
});

function loadFeedback(){
    let data = JSON.parse(localStorage.getItem("feedbacks")) || [];
    let box = document.getElementById("customerFeedback");

    box.innerHTML = "";

    data.slice().reverse().forEach(f=>{
        box.innerHTML += `
            <div class="feedback-item">
                <b>${f.name}</b><br>
                ${f.message}<br>
                <small>${f.time}</small>
            </div>
        `;
    });
}

loadFeedback();

</script>

</body>
</html>
