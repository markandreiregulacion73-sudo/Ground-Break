<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ground Break</title>

<style>
@keyframes color-glow {
    0% { color: #d9534f; }
    33% { color: #5bc0de; }
    66% { color: #5cb85c; }
    100% { color: #d9534f; }
}

body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    background: linear-gradient(to right, gold, #ffd966);
}

/* NAV */
nav {
    background: grey;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 40px;
    padding: 15px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
    flex-wrap: wrap;
}

nav a {
    text-decoration: none;
    color: white;
    padding: 16px 15px;
    font-size: 22px;
    font-weight: bold;
}

nav a:hover {
    background: black;
    border-radius: 5px;
}

nav img {
    width: 180px;
    height: 130px;
}

/* USER */
.user-box {
    color: white;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
}

.user-box:hover {
    background: rgba(0,0,0,0.5);
}

/* TITLE */
h1 {
    font-size: 60px;
    text-align: center;
    color: #222;
    margin: 40px 0;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CARD */
.contact-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 340px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    text-align: left;
    transition: transform 0.3s;
}

.contact-card:hover {
    transform: translateY(-8px);
}

.contact-card h2 {
    text-align: center;
    font-size: 30px;
    margin-bottom: 20px;
    animation: color-glow 3s infinite;
}

.contact-card p {
    font-size: 18px;
    margin: 10px 0;
    color: #333;
}

/* FACEBOOK */
.socials {
    display: flex;
    justify-content: flex-start;
    margin-top: 20px;
}

.fb-display {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    color: #333;
    text-decoration: none;
}

.fb-display:hover {
    color: #1877f2;
}

.fb-display img {
    width: 40px;
    transition: transform 0.3s;
}

.fb-display img:hover {
    transform: scale(1.2);
}

/* RESPONSIVE */
@media (max-width:768px){
    nav {
        justify-content: center;
        gap: 20px;
    }

    h1 {
        font-size: 40px;
    }

    .contact-card {
        width: 90%;
    }
}
</style>
</head>

<body>

<nav>
    <img src="GroundBreak.png" alt="Ground Break Logo">

    <a href="Home.html">Home</a>
    <a href="About.html">About</a>
    <a href="Services.html">Services</a>
    <a href="Contact.html">Contact</a>

    <div class="user-box" id="userBox" onclick="handleUserClick()">Guest</div>
</nav>

<h1>Contact Us</h1>

<div class="container">
    <div class="contact-card">
        <h2>Contact Us</h2>

        <p>📞 Phone: +09 282 567 994</p>
        <p>📧 Email: groundbreak@email.com</p>
        <p>📍 Location: Rizal, Philippines</p>

        <div class="socials">
            <a href="https://www.facebook.com/GroundBreakBilliardCafe" target="_blank" class="fb-display">
                <img src="fb.png" alt="Facebook">
                <span>Ground Break</span>
            </a>
        </div>
    </div>
</div>

<script>
let currentUser = localStorage.getItem("currentUser");

function updateUI(){
    document.getElementById("userBox").innerText = currentUser
        ? "👤 " + currentUser
        : "👤 Guest";
}

function handleUserClick(){
    if(currentUser){
        let confirmLogout = confirm("Do you want to log out?");
        if(confirmLogout){
            localStorage.removeItem("currentUser");
            alert("Logged out successfully!");
            window.location.href = "Login.html";
        }
    } else {
        alert("You are not logged in.");
        window.location.href = "Login.html";
    }
}

updateUI();
</script>

</body>
