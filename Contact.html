<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ground Break - Contact</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(to right, gold, #ffd966);
}

nav{
    width:100%;
    background:grey;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 5%;
    flex-wrap:wrap;
    gap:20px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.4);
}

.logo{
    width:160px;
    max-width:100%;
    height:auto;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    margin-left:auto;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:bold;
    padding:10px 14px;
    border-radius:6px;
    transition:0.3s;
}

.nav-links a:hover{
    background:black;
}

.user-box{
    color:white;
    font-weight:bold;
    background:rgba(0,0,0,0.3);
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    white-space:nowrap;
}

.user-box:hover{
    background:rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    font-size:48px;
    margin:40px 0 20px;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    flex-wrap:wrap;
    padding:20px 5% 60px;
}

.card{
    background:rgba(255,255,255,0.95);
    padding:25px;
    border-radius:18px;
    width:100%;
    max-width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card h2{
    text-align:center;
    margin-bottom:15px;
}

.card p{
    font-size:16px;
    margin:10px 0;
    line-height:1.6;
}

.fb{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:15px;
    text-decoration:none;
    color:#333;
    font-weight:bold;
}

.fb img{
    width:35px;
}

form{
    display:flex;
    flex-direction:column;
    gap:10px;
}

input, textarea{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    font-size:15px;
    outline:none;
}

textarea{
    height:120px;
    resize:none;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.feedback-list{
    margin-top:15px;
    max-height:220px;
    overflow:auto;
}

.feedback-item{
    background:#f5f5f5;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:14px;
}

@media(max-width:768px){
    nav{
        flex-direction:column;
        justify-content:center;
        text-align:center;
    }

    .nav-links{
        width:100%;
        justify-content:center;
        margin-left:0;
    }

    .logo{
        width:140px;
    }
}
</style>
</head>

<body>

<nav>
    <img src="GroundBreak.png" class="logo">

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="About.html">About</a>
        <a href="Services.html">Services</a>
        <a href="Contact.html">Contact</a>

        <div class="user-box" id="userBox" onclick="handleUserClick()">👤 Guest</div>
    </div>
</nav>

<h1>Contact Us</h1>

<div class="container">

    <div class="card">
        <h2>Contact Info</h2>
        <p>📞 +09 282 567 994</p>
        <p>📧 groundbreak@email.com</p>
        <p>📍 Rizal, Philippines</p>

        <a class="fb" href="https://www.facebook.com/GroundBreakBilliardCafe" target="_blank">
            <img src="fb.png">
            Ground Break
        </a>
    </div>

    <div class="card">
        <h2>Send Feedback</h2>

        <form id="feedbackForm">
            <input id="name" placeholder="Name" required>
            <input id="email" placeholder="Email" required>
            <input id="phone" placeholder="Contact Number" required>
            <textarea id="message" placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>

    <div class="card">
        <h2>Customer Feedback</h2>
        <div class="feedback-list" id="customerFeedback"></div>
    </div>

</div>

<script>
let currentUser = localStorage.getItem("currentUser");

function updateUI(){
    document.getElementById("userBox").innerText =
        currentUser ? "👤 " + currentUser : "👤 Guest";
}

function handleUserClick(){
    if(currentUser){
        if(confirm("Do you want to log out?")){
            localStorage.removeItem("currentUser");
            location.reload();
        }
    } else {
        window.location.href = "Login.html";
    }
}

document.getElementById("feedbackForm").addEventListener("submit", function(e){
    e.preventDefault();

    let data = JSON.parse(localStorage.getItem("feedbacks")) || [];

    data.push({
        name:name.value,
        email:email.value,
        phone:phone.value,
        message:message.value,
        time:new Date().toLocaleString()
    });

    localStorage.setItem("feedbacks", JSON.stringify(data));

    this.reset();
    loadFeedback();
});

function loadFeedback(){
    let data = JSON.parse(localStorage.getItem("feedbacks")) || [];
    let box = document.getElementById("customerFeedback");

    box.innerHTML = "";

    data.slice().reverse().forEach(f=>{
        box.innerHTML += `
            <div class="feedback-item">
                <b>${f.name}</b><br>
                ${f.message}<br>
                <small>${f.time}</small>
            </div>
        `;
    });
}

updateUI();
loadFeedback();
</script>

</body>
</html>
